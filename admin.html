<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>admin</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --fg: #e8e8e8;
      --dim: #555;
      --border: #1e1e1e;
      --border-focus: #444;
      --err: #c0392b;
      --ok: #27ae60;
    }

    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      min-height: 100vh;
    }

    body {
      display: flex;
      flex-direction: column;
      max-width: 680px;
      margin: 0 auto;
      padding: 80px 24px 60px;
    }

    header { margin-bottom: 64px; }

    header h1 {
      font-size: 13px;
      font-weight: 400;
      color: var(--dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    header h1 span { color: var(--fg); }
    .meta { margin-top: 6px; font-size: 11px; color: var(--dim); }

    /* LOGIN */
    #login-section { max-width: 320px; }

    .field { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--fg);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      padding: 8px 0;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-bottom-color: var(--border-focus); }

    .btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 20px;
      cursor: pointer;
      transition: border-color 0.15s, opacity 0.15s;
    }

    .btn:hover:not(:disabled) { border-color: var(--fg); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-ghost {
      border-color: transparent;
      color: var(--dim);
      padding-left: 0;
    }

    .btn-ghost:hover:not(:disabled) { color: var(--fg); border-color: transparent; }

    .msg { font-size: 12px; margin-top: 12px; min-height: 16px; }
    .msg.err { color: var(--err); }
    .msg.ok  { color: var(--ok); }

    /* ADMIN */
    #admin-section { display: none; }

    .section-label {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .upload-zone {
      border: 1px dashed var(--border);
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s;
      margin-bottom: 24px;
      position: relative;
    }

    .upload-zone:hover,
    .upload-zone.drag-over { border-color: var(--fg); }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .zone-text { font-size: 12px; color: var(--dim); pointer-events: none; }
    .zone-text span { display: block; margin-top: 6px; font-size: 11px; }

    .name-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 20px;
    }

    .name-row .field { flex: 1; margin-bottom: 0; }

    #selected-file-name {
      font-size: 12px;
      color: var(--dim);
      margin-bottom: 16px;
      min-height: 16px;
    }

    .admin-list { margin-top: 48px; }

    .admin-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .admin-item:first-child { border-top: 1px solid var(--border); }

    .admin-item-name {
      font-size: 13px;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .admin-item-date { font-size: 11px; color: var(--dim); flex-shrink: 0; }

    .admin-item-del {
      background: none;
      border: none;
      color: var(--dim);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      padding: 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .admin-item-del:hover:not(:disabled) { color: var(--err); }
    .admin-item-del:disabled { opacity: 0.3; cursor: not-allowed; }

    .list-state {
      font-size: 13px;
      color: var(--dim);
      padding: 4px 0;
    }

    .loading { animation: pulse 1.4s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 1; }
    }

    footer {
      margin-top: 64px;
      font-size: 11px;
      color: var(--dim);
      display: flex;
      justify-content: space-between;
    }

    footer a { color: var(--dim); text-decoration: none; transition: color 0.15s; }
    footer a:hover { color: var(--fg); }
  </style>
</head>
<body>

  <header>
    <h1>/ <span>admin</span></h1>
    <p class="meta">restricted access</p>
  </header>

  <!-- LOGIN -->
  <section id="login-section">
    <div class="field">
      <label for="pw">password</label>
      <input type="password" id="pw" autocomplete="current-password" />
    </div>
    <button class="btn" id="login-btn">enter</button>
    <p class="msg err" id="login-msg"></p>
  </section>

  <!-- ADMIN PANEL -->
  <section id="admin-section">
    <p class="section-label">upload project</p>

    <div class="upload-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".html,.htm" />
      <div class="zone-text">
        drop .html file here or click to browse
        <span>only .html / .htm files</span>
      </div>
    </div>

    <p id="selected-file-name"></p>

    <div class="name-row">
      <div class="field">
        <label for="proj-name">display name</label>
        <input type="text" id="proj-name" placeholder="my cool project" />
      </div>
      <button class="btn" id="upload-btn">add project</button>
    </div>

    <p class="msg" id="upload-msg"></p>

    <div class="admin-list">
      <p class="section-label">manage projects</p>
      <div id="admin-project-list">
        <p class="list-state loading">loading...</p>
      </div>
    </div>

    <div style="margin-top:32px;">
      <button class="btn btn-ghost" id="logout-btn">← logout</button>
    </div>
  </section>

  <footer>
    <a href="/">← back to site</a>
    <span id="footer-year"></span>
  </footer>

  <script>
    const PASSWORD = 'Blahblah123!@';

    function escHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── session ───────────────────────────────────────────
    const isLoggedIn  = () => sessionStorage.getItem('admin_auth') === '1';
    const setLoggedIn = v  => v
      ? sessionStorage.setItem('admin_auth', '1')
      : sessionStorage.removeItem('admin_auth');

    function showPanel() {
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('admin-section').style.display = 'block';
      loadAdminList();
    }

    function showLogin() {
      document.getElementById('login-section').style.display = 'block';
      document.getElementById('admin-section').style.display = 'none';
    }

    isLoggedIn() ? showPanel() : showLogin();

    // ── login ─────────────────────────────────────────────
    document.getElementById('login-btn').addEventListener('click', doLogin);
    document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    function doLogin() {
      if (document.getElementById('pw').value === PASSWORD) {
        setLoggedIn(true);
        showPanel();
      } else {
        const msg = document.getElementById('login-msg');
        msg.textContent = 'incorrect password.';
        setTimeout(() => { msg.textContent = ''; }, 2000);
      }
    }

    document.getElementById('logout-btn').addEventListener('click', () => {
      setLoggedIn(false);
      showLogin();
    });

    // ── file select ───────────────────────────────────────
    let selectedFile = null;
    const fileInput = document.getElementById('file-input');
    const dropZone  = document.getElementById('drop-zone');
    const fileLabel = document.getElementById('selected-file-name');
    const nameInput = document.getElementById('proj-name');

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) selectFile(fileInput.files[0]);
    });

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) selectFile(e.dataTransfer.files[0]);
    });

    function selectFile(f) {
      if (!f.name.match(/\.html?$/i)) {
        showMsg('upload-msg', 'only .html files allowed.', 'err');
        return;
      }
      selectedFile = f;
      fileLabel.textContent = `selected: ${f.name}`;
      if (!nameInput.value) {
        nameInput.value = f.name.replace(/\.html?$/i, '').replace(/[-_]/g, ' ');
      }
    }

    // ── upload ────────────────────────────────────────────
    document.getElementById('upload-btn').addEventListener('click', doUpload);

    async function doUpload() {
      if (!selectedFile) { showMsg('upload-msg', 'no file selected.', 'err'); return; }
      const name = nameInput.value.trim();
      if (!name) { showMsg('upload-msg', 'enter a display name.', 'err'); return; }

      const btn = document.getElementById('upload-btn');
      btn.disabled = true;
      btn.textContent = 'uploading...';

      try {
        const content = await selectedFile.text();
        const res = await fetch('/api/projects', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, filename: selectedFile.name, content }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: res.statusText }));
          throw new Error(err.error || res.statusText);
        }

        selectedFile = null;
        fileInput.value = '';
        nameInput.value = '';
        fileLabel.textContent = '';
        showMsg('upload-msg', `"${name}" uploaded successfully.`, 'ok');
        loadAdminList();
      } catch (e) {
        console.error('Upload error:', e);
        showMsg('upload-msg', `upload failed: ${e.message}`, 'err');
      } finally {
        btn.disabled = false;
        btn.textContent = 'add project';
      }
    }

    // ── admin list ────────────────────────────────────────
    async function loadAdminList() {
      const el = document.getElementById('admin-project-list');
      el.innerHTML = '<p class="list-state loading">loading...</p>';
      try {
        const res = await fetch('/api/projects');
        if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
        const projects = await res.json();
        renderAdminList(projects);
      } catch (e) {
        console.error('Load error:', e);
        el.innerHTML = '<p class="list-state" style="color:var(--err)">error loading projects.</p>';
      }
    }

    function renderAdminList(projects) {
      const el = document.getElementById('admin-project-list');
      if (!projects.length) {
        el.innerHTML = '<p class="list-state">no projects yet.</p>';
        return;
      }
      el.innerHTML = projects.map(p => `
        <div class="admin-item">
          <span class="admin-item-name">${escHtml(p.name)}</span>
          <span class="admin-item-date">${p.created_at ? p.created_at.slice(0,10) : ''}</span>
          <button class="admin-item-del" data-id="${escHtml(p.id)}" title="delete">✕</button>
        </div>
      `).join('');

      el.querySelectorAll('.admin-item-del').forEach(btn => {
        btn.addEventListener('click', () => deleteProject(btn.dataset.id, btn));
      });
    }

    async function deleteProject(id, btn) {
      btn.disabled = true;
      try {
        const res = await fetch(`/api/projects/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
        loadAdminList();
      } catch (e) {
        console.error('Delete error:', e);
        btn.disabled = false;
        showMsg('upload-msg', 'delete failed.', 'err');
      }
    }

    // ── msg helper ────────────────────────────────────────
    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'msg' + (type ? ' ' + type : '');
      setTimeout(() => { el.textContent = ''; el.className = 'msg'; }, 4000);
    }

    document.getElementById('footer-year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
